<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7Yards Admin | Add New Jaipur Property Project</title>
  <meta name="description" content="Admin page for 7Yards to add new residential plot projects in Jaipur and download updated project JSON data." />
  <meta name="keywords" content="7Yards admin, add project Jaipur, edit project JSON, residential plot data Jaipur" />
  <meta property="og:title" content="7Yards Admin | Add New Jaipur Property Project" />
  <meta property="og:description" content="Use the admin form to generate updated project JSON for 7Yards residential plots in Jaipur." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://example.com/admin.html" />
  <meta property="og:image" content="https://picsum.photos/id/1035/1200/630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="7Yards Admin | Add New Jaipur Property Project" />
  <meta name="twitter:description" content="Generate updated JSON data for new 7Yards residential plots in Jaipur using the admin form." />
  <meta name="twitter:image" content="https://picsum.photos/id/1035/1200/630" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            emerald: {
              500: '#10b981',
              600: '#059669',
              700: '#047857'
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background-color: #f8f9fa; }
    .shadow-soft { box-shadow: 0 20px 45px rgba(15, 23, 42, .06); }
  </style>
</head>
<body class="text-slate-900">
  <div class="min-h-screen bg-[radial-gradient(circle_at_top_left,_rgba(16,185,129,0.12),_transparent_25%),_radial-gradient(circle_at_bottom_right,_rgba(14,165,233,0.12),_transparent_20%)]">
    <header class="border-b border-slate-200 bg-white/95 py-5 shadow-sm">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-6">
        <a href="index.html" class="flex items-center gap-3 font-semibold text-slate-900">
          <div class="h-10 w-10 rounded-2xl bg-emerald-500 text-center text-sm font-semibold leading-10 text-white">7Y</div>
          <span>7Yards Admin</span>
        </a>
        <a href="index.html" class="rounded-full border border-slate-300 bg-white px-4 py-2 text-sm text-slate-700 transition hover:border-emerald-500 hover:text-emerald-700">Back to Live Site</a>
      </div>
    </header>

    <main class="mx-auto max-w-5xl px-6 py-12">
      <section class="rounded-[2rem] bg-white p-8 shadow-soft">
        <div class="mb-8">
          <p class="text-sm uppercase tracking-[0.32em] text-emerald-600">Project Admin</p>
          <h1 class="mt-3 text-3xl font-semibold text-slate-900">Add a new 7Yards residential plot project</h1>
          <p class="mt-3 text-slate-600">Fill the form and download the updated JSON file. Replace <code class="rounded bg-slate-100 px-2 py-1 text-sm">data/projects.json</code> with the downloaded content.</p>
        </div>

        <form id="projectForm" class="grid gap-6">
          <div class="grid gap-6 sm:grid-cols-2">
            <label class="space-y-2 text-sm text-slate-700">
              <span>Project Slug</span>
              <input name="slug" type="text" placeholder="eden-gardens" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
            <label class="space-y-2 text-sm text-slate-700">
              <span>Project Name</span>
              <input name="name" type="text" placeholder="7Yards Eden Gardens" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
          </div>
          <div class="grid gap-6 sm:grid-cols-2">
            <label class="space-y-2 text-sm text-slate-700">
              <span>Location</span>
              <input name="location" type="text" placeholder="Ajmer Road, Jaipur" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
            <label class="space-y-2 text-sm text-slate-700">
              <span>Price / sq.yd</span>
              <input name="pricePerSqYd" type="number" min="1000" placeholder="4500" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
          </div>

          <label class="space-y-2 text-sm text-slate-700">
            <span>Gallery Image IDs</span>
            <input name="galleryIds" type="text" placeholder="1018,1025,1031,1043" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            <p class="text-xs text-slate-500">Use Picsum image IDs separated by commas.</p>
          </label>
          <label class="space-y-2 text-sm text-slate-700">
            <span>Amenities</span>
            <input name="amenities" type="text" placeholder="Clubhouse,24/7 security,Wide roads,..." required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            <p class="text-xs text-slate-500">Enter at least 6 amenities separated by commas.</p>
          </label>

          <div class="grid gap-6 sm:grid-cols-2">
            <label class="space-y-2 text-sm text-slate-700">
              <span>Ownership</span>
              <input name="ownership" type="text" placeholder="Freehold" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
            <label class="space-y-2 text-sm text-slate-700">
              <span>Super Area</span>
              <input name="superArea" type="text" placeholder="1000 - 2500 sq.yd" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
          </div>
          <div class="grid gap-6 sm:grid-cols-2">
            <label class="space-y-2 text-sm text-slate-700">
              <span>Length</span>
              <input name="length" type="text" placeholder="40 ft" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
            <label class="space-y-2 text-sm text-slate-700">
              <span>Breadth</span>
              <input name="breadth" type="text" placeholder="25 ft" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
          </div>
          <div class="grid gap-6 sm:grid-cols-2">
            <label class="space-y-2 text-sm text-slate-700">
              <span>Facing Road Width</span>
              <input name="widthOfFacingRoad" type="text" placeholder="30 ft" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
            <label class="space-y-2 text-sm text-slate-700">
              <span>Facing</span>
              <input name="facing" type="text" placeholder="North / East" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
          </div>
          <div class="grid gap-6 sm:grid-cols-2">
            <label class="space-y-2 text-sm text-slate-700">
              <span>Gated Community</span>
              <input name="gatedCommunity" type="text" placeholder="Yes" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
            <label class="space-y-2 text-sm text-slate-700">
              <span>Open Sides</span>
              <input name="openSides" type="text" placeholder="2 sides" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
          </div>
          <div class="grid gap-6 sm:grid-cols-2">
            <label class="space-y-2 text-sm text-slate-700">
              <span>Corner Plot</span>
              <input name="cornerPlot" type="text" placeholder="Available" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
            <label class="space-y-2 text-sm text-slate-700">
              <span>Boundary Wall</span>
              <input name="boundaryWall" type="text" placeholder="Yes" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
          </div>
          <div class="grid gap-6 sm:grid-cols-2">
            <label class="space-y-2 text-sm text-slate-700">
              <span>Water Supply</span>
              <input name="waterSupply" type="text" placeholder="Confirmed" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
            <label class="space-y-2 text-sm text-slate-700">
              <span>Electricity</span>
              <input name="electricity" type="text" placeholder="Available" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
          </div>
          <div class="grid gap-6 sm:grid-cols-2">
            <label class="space-y-2 text-sm text-slate-700">
              <span>Road Type</span>
              <input name="roadType" type="text" placeholder="Paved internal roads" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
            <label class="space-y-2 text-sm text-slate-700">
              <span>Possession</span>
              <input name="possession" type="text" placeholder="Immediate" required class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" />
            </label>
          </div>
          <label class="space-y-2 text-sm text-slate-700">
            <span>Project Description</span>
            <textarea name="description" rows="5" placeholder="Enter the property description here..." class="w-full rounded-3xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 outline-none focus:border-emerald-500" required></textarea>
          </label>
          <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <button type="submit" class="inline-flex items-center justify-center rounded-full bg-emerald-500 px-7 py-3 text-sm font-semibold text-white transition hover:bg-emerald-600">Generate JSON</button>
            <a id="downloadLink" class="hidden rounded-full border border-emerald-500 px-5 py-3 text-sm font-semibold text-emerald-700 transition hover:bg-emerald-50">Download JSON</a>
          </div>
          <p id="adminStatus" class="text-sm text-slate-600"></p>
        </form>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
